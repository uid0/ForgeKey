; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
dir = .

[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_extra_dirs = lib
extra_scripts = pre:scripts/build/version.py

[env:seeed_xiao_esp32s3]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps =
    espressif/esp32-camera
    knolleary/PubSubClient
    tanakamasayuki/TensorFlowLite_ESP32@^1.0.0
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
lib_extra_dirs = ${common.lib_extra_dirs}
build_src_filter =
    +<*>
    -<temperature/>
    -<capabilities/temperature_sensor/>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -Isrc/camera
    -Isrc/detection
    -Isrc/counting
    -Isrc/mqtt
    -Isrc/provisioning
    -Isrc/photo_upload
    -Isrc/ota
    -Isrc/security
    -Isrc/config
    -Isrc/wifi_setup
    -Isrc/capabilities
    -Isrc/capabilities/ble_scanner
    -Isrc/capabilities/ble_beacon
    -Isrc/capabilities/ble_relay
    -Isrc/capabilities/ble_equipment
extra_scripts = ${common.extra_scripts}

; Cabinet-lock variant. ESP32-C6 build using ESP-IDF framework.
; Complete ESP-IDF native implementation (not Arduino).
; All source files in esp32c6-lock/main/.
;
; MQTT topic shape: cabinets/{mac}/cmd (unlock commands from Django)
; Telemetry topic:  forgekey/{mac}/cabinet_lock/status
; Sensor kind in registration metadata: cabinet-lock
;
; Build: cd esp32c6-lock && idf.py build
; Or via PlatformIO: pio run -e seeed_xiao_esp32c6_lock
[env:seeed_xiao_esp32c6_lock]
platform = espressif32
board = seeed_xiao_esp32c6
framework = esp-idf
board_build.esp-idf-editor-path = ${platformio.dir}/.cache/esp-idf-editor
board_build.partitions = default.csv
board_build.flash_mode = qio
; Use the ESP-IDF project directly
board_build.filesystem = littlefs
; ESP-IDF project directory
board_build.arduino_variant = 
project_dir = esp32c6-lock
extra_scripts = post:scripts/build/version.py
build_src_filter =
    +<*>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DFORGEKEY_LOCK
    -DFORGEKEY_SENSOR_KIND=\"cabinet-lock\"
    -DFORGEKEY_MQTT_TOPIC_KIND=\"cabinet_lock\"
    -DFORGEKEY_LOCK_SOLENOID_PIN=0
    -DFORGEKEY_LOCK_REED_PIN=1
    -DFORGEKEY_LOCK_MORTISE_PIN=5
    -DFORGEKEY_LOCK_LATCH_SUPERVISOR_PIN=6
    -DFORGEKEY_LOCK_IR_BEAM_PIN=4
    -DFORGEKEY_LOCK_SOLENOID_ACTIVE=HIGH
    -DFORGEKEY_LOCK_SOLENOID_PULSE_MS=1500
    -DFORGEKEY_LOCK_AUTO_RELOCK_MS=0
    -DFORGEKEY_LOCK_TELEMETRY_INTERVAL_MS=10000
    -DFORGEKEY_LOCK_CMD_TIMESTAMP_TOLERANCE_S=60
    -DFORGEKEY_LOCK_JWT_EXPIRY_S=30
    -DFORGEKEY_LOCK_JWT_SECRET=\"forgekey-lock-secret-change-in-production\"
    -DFORGEKEY_LOCK_WEB_PORT=80
    -DFORGEKEY_LOCK_IR_DEBOUNCE_MS=500
    -DFORGEKEY_LOCK_REED_DEBOUNCE_MS=200
    -DFORGEKEY_LOCK_LATCH_DEBOUNCE_MS=200
    -DFORGEKEY_LOCK_MORTISE_DEBOUNCE_MS=200
    -DFORGEKEY_LOCK_ALARM_FLASH_MS=200
    -DOS_MAX_ENTRY_ENTRIES=16
    -DCJSON_MAX_DEPTH=20
    -DCJSON_MAX_FIELDS=20
    -DCJSON_MAX_INDENT=0

; Temperature-sensor variant. Same firmware skeleton (provisioning, OTA,
; captive portal, MQTT, config rotation) but the camera/detection/photo
; pipeline is compiled out and a DHT 21 (AM2301) is sampled instead.
;
; Topic shape: forgekey/<mac>/temperature_sensor/reading
; Sensor kind in registration metadata: temperature-sensor
; Default DHT data pin: GPIO 2 (D1 on the XIAO ESP32-S3 header)
[env:seeed_xiao_esp32s3_temperature]
platform = ${common.platform}
board = seeed_xiao_esp32s3
framework = ${common.framework}
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
    beegee-tokyo/DHT sensor library for ESPx@^1.19.0
lib_extra_dirs = ${common.lib_extra_dirs}
build_src_filter =
    +<*>
    -<camera/>
    -<detection/>
    -<counting/>
    -<photo_upload/>
    -<capabilities/people_counter/>
    -<capabilities/ble_scanner/>
    -<capabilities/ble_beacon/>
    -<capabilities/ble_relay/>
    -<capabilities/ble_equipment/>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DFORGEKEY_TEMPERATURE_SENSOR
    -DFORGEKEY_DISABLE_BLE_SCANNER
    -DFORGEKEY_DISABLE_BLE_BEACON
    -DFORGEKEY_DISABLE_BLE_RELAY
    -DFORGEKEY_DISABLE_BLE_EQUIPMENT
    -DFORGEKEY_SENSOR_KIND=\"temperature-sensor\"
    -DFORGEKEY_MQTT_TOPIC_KIND=\"temperature_sensor\"
    -Isrc/mqtt
    -Isrc/provisioning
    -Isrc/ota
    -Isrc/security
    -Isrc/config
    -Isrc/wifi_setup
    -Isrc/temperature
    -Isrc/capabilities
    -Isrc/capabilities/status_led
extra_scripts = ${common.extra_scripts}
